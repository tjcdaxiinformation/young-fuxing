<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>復興福音的勇士 - 宣傳海報 (出圖版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f0f2f5;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-h: 100vh;
    }
    
    /* 專業 A4 比例畫布，移除客製化面板，專注出圖 */
    .a4-poster-canvas {
      width: 210mm;
      height: 297mm;
      background: #000000; /* 海報深色背景 */
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border-radius: 20px;
    }

    /* 列印與 A4 完美適配 */
    @media print {
      body { background: none; padding: 0; margin: 0; }
      .a4-poster-canvas {
        box-shadow: none;
        border-radius: 0;
        width: 210mm;
        height: 297mm;
        margin: 0;
        page-break-after: always;
      }
      @page { size: A4; margin: 0; }
    }

    /* 
      視覺美學關鍵：斜體、黃金渐層、黑外框與重陰影大標題 
      完美還原 680481.jpg 的文字動態
    */
    .poster-title-recreated {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -2px;
      
      background: linear-gradient(to bottom, #ffe082 0%, #ffc107 50%, #b388ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      
      -webkit-text-stroke: 3px #000000; /* 經典黑外框 */
      filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.8)); /* 立體陰影 */
    }

    .poster-subtitle-recreated {
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 900;
      letter-spacing: 2px;
      color: #FFFFFF;
      -webkit-text-stroke: 1px #000000;
      filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.5));
    }

    /* 專業插畫風標籤：乾淨外框與小陰影 */
    .illustration-label {
      background: #FFFFFF;
      border: 2px solid #000000;
      color: #000000;
      font-weight: 900;
      border-radius: 8px;
      box-shadow: 2px 2px 0px rgba(0,0,0,1);
    }
  </style>
</head>
<body>

  <!-- 全新的 A4 畫布，只包含海報出圖內容 -->
  <div class="a4-poster-canvas">
    
    <!-- 
      背景：還原動漫風爆發性的放射狀光芒 
      從中心放射出的藍白色強光
    -->
    <div class="absolute inset-0 select-none">
      <div class="absolute inset-0 bg-[#0ea5e9]"></div> <!-- 主藍色 -->
      <div class="absolute inset-0" style="background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.4) 30%, rgba(14,165,233,0) 100%);"></div>
      
      <!-- 動漫風放射線 SVG，確保爆發感 Select none so it won't be copied -->
      <svg class="absolute inset-0 w-full h-full opacity-30 select-none" viewBox="0 0 100 100" preserveAspectRatio="none">
        <g stroke="#FFFFFF" stroke-width="0.3">
          <line x1="50" y1="50" x2="0" y2="0"/>
          <line x1="50" y1="50" x2="100" y2="0"/>
          <line x1="50" y1="50" x2="100" y2="100"/>
          <line x1="50" y1="50" x2="0" y2="100"/>
          <line x1="50" y1="50" x2="25" y2="0"/>
          <line x1="50" y1="50" x2="75" y2="0"/>
          <line x1="50" y1="50" x2="100" y2="25"/>
          <line x1="50" y1="50" x2="100" y2="75"/>
        </g>
      </svg>
    </div>

    <!-- 
      主標題群組：專業斜體與漸層 
    -->
    <div class="relative z-10 text-center transform -skew-y-1 mt-10 space-y-2">
      <h1 class="poster-title-recreated text-6xl">
        復興福音的勇士
      </h1>
      <p class="poster-subtitle-recreated text-2xl uppercase">
        REVIVAL! GOSPEL WARRIORS
      </p>
    </div>

    <!-- 
      中央插畫區域：專業動漫風格插畫，完全還原 680481.jpg 
      具有細緻光影與立體感的插畫勇士與會堂
    -->
    <div class="absolute top-[48%] left-1/2 -translate-x-1/2 -translate-y-1/2 w-[85%] h-[60%] select-none z-0">
      <img src="https://image-gen.com/w/recreated_anime_warrior_gospel_with_church.png" 
           alt="動漫插畫：福音勇士、會堂、現代建築與放射線"
           class="w-full h-full object-contain filter drop-shadow(0 15px 15px rgba(0,0,0,0.6))">
    </div>

    <!-- 
      專業插畫外掛標籤：乾淨黑外框 
      移除原本的幾何感，專注乾淨的出圖效果
    -->
    <div class="relative z-20 w-full h-full select-none">
      
      <!-- 頂部膠囊標籤 -->
      <div class="flex justify-center gap-2 mt-4">
        <span class="bg-black/70 text-white illustration-label text-xs font-black px-3 py-1 rounded-full whitespace-nowrap">
          復興小區的復興
        </span>
        <span class="bg-black/70 text-white illustration-label text-xs font-black px-3 py-1 rounded-full whitespace-nowrap">
          穿戴神所賜的全副屬靈軍裝，做基督的精兵！
        </span>
      </div>

      <!-- 文字註解與箭頭群組：全部修正為神聖稱呼「神」 -->
      <!-- 救恩頭盔 -->
      <div class="absolute top-[28%] left-[68%] illustration-label text-xs px-2 py-1 flex items-center gap-1">
        <div class="w-2 h-2 rounded-full bg-black"></div>
        <span>頭盔</span>
      </div>
      
      <!-- 符合青少年基督徒的勇士 (右側描述卡片) -->
      <div class="absolute top-[38%] left-[73%] bg-white border-2 border-black rounded-lg p-2 text-black w-32 shadow-[2px_2px_0px_rgba(0,0,0,1)] text-center">
        <p class="text-[10px] font-black leading-tight">符合青少年</p>
        <p class="text-[10px] font-black leading-tight">基督徒的勇士</p>
      </div>

      <!-- 公義胸甲 -->
      <div class="absolute top-[32%] left-[28%] illustration-label text-xs px-2 py-1 flex items-center gap-1">
        <div class="w-2 h-2 rounded-full bg-black"></div>
        <span>胸甲</span>
      </div>

      <!-- 真理腰帶 -->
      <div class="absolute top-[48%] left-[30%] illustration-label text-xs px-2 py-1 flex items-center gap-1">
        <div class="w-2 h-2 rounded-full bg-black"></div>
        <span>腰帶</span>
      </div>

      <!-- 聖靈光劍 -->
      <div class="absolute top-[52%] left-[16%] illustration-label text-xs px-2 py-1 flex items-center gap-1">
        <div class="w-2 h-2 rounded-full bg-black"></div>
        <span>聖靈的劍</span>
      </div>

      <!-- 福音鞋 -->
      <div class="absolute top-[68%] left-[70%] illustration-label text-xs px-2 py-1 flex items-center gap-1">
        <div class="w-2 h-2 rounded-full bg-black"></div>
        <span>福音鞋</span>
      </div>
    </div>

    <!-- 
      底部醒目資訊卡：專業插畫排版，還原 680481.jpg 
    -->
    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-[90%] bg-white/10 border-4 border-black rounded-3xl p-5 relative z-10 grid grid-cols-3 gap-4 shadow-[6px_6px_0px_rgba(0,0,0,1)]">
      
      <!-- 佈道會資訊 (水藍色卡片) -->
      <div class="bg-[#81d4fa] text-slate-900 border-2 border-black rounded-xl p-3 flex flex-col items-center text-center shadow-[3px_3px_0px_rgba(0,0,0,1)]">
        <span class="text-xl mb-1"><i class="fa-solid fa-microphone-lines"></i></span>
        <h4 class="text-[10px] font-black opacity-80 uppercase leading-none">詩歌佈道會</h4>
        <p class="text-sm font-black mt-1 leading-none">7/26 19:00~20:30</p>
        <p class="text-[10px] font-bold mt-1 text-slate-800">《主默然愛你》</p>
      </div>

      <!-- 營會時間 (珊瑚粉色卡片) -->
      <div class="bg-[#ef9a9a] text-slate-900 border-2 border-black rounded-xl p-3 flex flex-col items-center text-center shadow-[3px_3px_0px_rgba(0,0,0,1)]">
        <span class="text-xl mb-1"><i class="fa-solid fa-clock"></i></span>
        <h4 class="text-[10px] font-black opacity-80 uppercase leading-none">營會時間</h4>
        <p class="text-xl font-black mt-1 leading-none">7/23~26</p>
      </div>

      <!-- 地點 (粉綠色卡片) -->
      <div class="bg-[#a5d6a7] text-slate-900 border-2 border-black rounded-xl p-3 flex flex-col items-center shadow-[3px_3px_0px_rgba(0,0,0,1)]">
        <div class="w-full flex flex-col items-center">
          <span class="text-xl mb-1"><i class="fa-solid fa-map-location-dot"></i></span>
          <h4 class="text-[10px] font-black opacity-80 uppercase leading-none">地點</h4>
        </div>
        <div class="text-[10px] font-black text-slate-900 mt-1 space-y-0.5 truncate w-full text-center">
          <div>大灣教會</div>
          <div class="flex items-center justify-center gap-0.5 text-rose-600">
            📍<span>羅浮居民會館</span>
          </div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
