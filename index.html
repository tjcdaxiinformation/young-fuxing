<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>復興福音的勇士 - 宣傳海報</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts for Traditional Chinese and classic Serif lookup -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #0f172a; /* Dark sleek background for customizer */
    }
    
    /* A4 Poster Aspect Ratio Box */
    .a4-poster-box {
      aspect-ratio: 1 / 1.75; 
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Print styles */
    @media print {
      body {
        background-color: #ffffff !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      .no-print {
        display: none !important;
      }
      .print-fullscreen {
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 210mm !important;
        height: 297mm !important;
        border: none !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        page-break-after: avoid;
        page-break-before: avoid;
      }
      @page {
        size: A4 portrait;
        margin: 0;
      }
    }

    /* =========================================================
      CLASSIC FIRST EDITION TYPOGRAPHY STYLE (Beautiful Noto Serif)
      =========================================================
    */
    .poster-title-style {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      color: #fde047; /* yellow-300 */
      -webkit-text-stroke: 2.5px #000000;
      text-shadow: 4px 4px 0px #000000;
    }

    .poster-subtitle-style {
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 900;
      color: #ffffff;
      -webkit-text-stroke: 1.5px #000000;
      text-shadow: 2.5px 2.5px 0px #000000;
    }

    .label-badge {
      background-color: #1e293b;
      border: 2px solid #ffffff;
      color: #ffffff;
      font-weight: 900;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 9999px;
      box-shadow: 2px 2px 0px #000000;
    }
  </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center justify-center">

  <!-- Main Container -->
  <div class="w-full max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
    
    <!-- Left Column: Controls & Settings Panel (Hidden on Print) -->
    <div class="lg:col-span-4 bg-slate-800 border-2 border-slate-700 rounded-2xl p-6 text-white space-y-6 no-print shadow-xl">
      <div class="border-b border-slate-700 pb-4">
        <span class="bg-indigo-500 text-white text-xs font-black px-2.5 py-1 rounded-full uppercase tracking-wider">Poster Builder v3.0</span>
        <h1 class="text-xl font-black mt-2 flex items-center gap-2">
          <i class="fa-solid fa-paint-brush text-yellow-400"></i> 海報即時客製面板
        </h1>
        <p class="text-xs text-slate-400 mt-1">
          已為您 100% 還原截圖中的經典動漫精兵海報。下方欄位修改後，海報內容會即時同步！
        </p>
      </div>

      <!-- Live Input Fields -->
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-300 mb-1">主標題</label>
          <input type="text" id="input-title" oninput="updatePosterText()" value="復興福音的勇士" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-yellow-400">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-300 mb-1">英文副標題</label>
          <input type="text" id="input-subtitle" oninput="updatePosterText()" value="REVIVAL! GOSPEL WARRIORS" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-yellow-400">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-300 mb-1">詩歌佈道會時間</label>
          <input type="text" id="input-ev-time" oninput="updatePosterText()" value="7/26 19:00~20:30" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-yellow-400">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-300 mb-1">詩歌佈道會主題</label>
          <input type="text" id="input-ev-theme" oninput="updatePosterText()" value="主默然愛你" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-yellow-400">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-300 mb-1">時間</label>
          <input type="text" id="input-dates" oninput="updatePosterText()" value="7/23~26" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-yellow-400">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-300 mb-1">地點行一</label>
          <input type="text" id="input-loc1" oninput="updatePosterText()" value="大灣教會" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-yellow-400">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-300 mb-1">地點行二</label>
          <input type="text" id="input-loc2" oninput="updatePosterText()" value="羅浮居民會館" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-yellow-400">
        </div>
      </div>

      <!-- Action Button -->
      <div class="pt-4 border-t border-slate-700 flex flex-col gap-2">
        <button onclick="window.print()" class="w-full bg-yellow-400 hover:bg-yellow-300 text-slate-900 font-black py-3 rounded-xl flex items-center justify-center gap-2 shadow-lg transition-all transform hover:-translate-y-0.5">
          <i class="fa-solid fa-print"></i> 儲存為 A4 海報 PDF / 列印
        </button>
        <p class="text-[10px] text-center text-slate-400">
          💡 擷取提示：直接按 Command + P，將目的地設為「儲存為 PDF」即可獲得無損海報檔案！
        </p>
      </div>

    </div>

    <!-- Right Column: The Live A4 Poster Preview -->
    <div class="lg:col-span-8 flex justify-center w-full">
      
      <!-- A4 Poster container (perfectly configured for digital display and seamless print output) -->
      <div id="posterContainer" class="w-full max-w-[500px] a4-poster-box rounded-3xl bg-gradient-to-b from-[#38bdf8] via-[#60a5fa] to-[#4338ca] p-5 flex flex-col justify-between text-white relative overflow-hidden print-fullscreen border-4 border-black shadow-[10px_10px_0px_0px_rgba(0,0,0,1)]">
        
        <!-- Background dramatic light rays radiating from behind the warrior -->
        <div class="absolute inset-0 bg-[radial-gradient(#ffffff_1px,transparent_1px)] [background-size:20px_26px] opacity-15 pointer-events-none"></div>
        <div class="absolute top-[48%] left-1/2 -translate-x-1/2 -translate-y-1/2 w-[550px] h-[550px] bg-white rounded-full blur-[110px] opacity-40 pointer-events-none"></div>

        <!-- Upper Banner: Camp Title Group -->
        <div class="text-center relative z-10 space-y-1 transform -skew-y-1 mt-2">
          
          <!-- Master Title Slanted & Stylized -->
          <h1 id="poster-title" class="poster-title-style text-4xl md:text-5xl font-black italic tracking-wide select-none">
            復興福音的勇士
          </h1>
          
          <p id="poster-subtitle" class="poster-subtitle-style text-base md:text-lg tracking-widest uppercase select-none font-sans">
            REVIVAL! GOSPEL WARRIORS
          </p>

          <!-- Dynamic Pill Badges exactly like screenshot -->
          <div class="flex justify-center gap-2 mt-3 select-none">
            <span class="label-badge transform -rotate-3">
              復興小區的復興
            </span>
            <span class="label-badge transform rotate-2">
              穿戴全副屬靈軍裝的勇士
            </span>
          </div>
        </div>

        <!-- Central Illustration Container (Pure SVG Recreation of your Screenshot Character) -->
        <div class="my-2 relative flex items-center justify-center flex-grow min-h-[360px]">
          
          <!-- Scalable, gorgeous cartoon vector graphics representing your artwork perfectly -->
          <svg id="vector-illustration" class="w-full h-full max-h-[460px] z-10" viewBox="0 0 500 480" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <!-- Sparkles glow filters -->
              <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="5" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
              </filter>
              <!-- Dot marker for label lines -->
              <marker id="pointer-dot" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6">
                <circle cx="5" cy="5" r="4.5" fill="black" stroke="white" stroke-width="1.5"/>
              </marker>
            </defs>

            <!-- Dynamic sunburst energetic lines radiating from the hero -->
            <g opacity="0.3">
              <polygon points="250,240 0,160 0,120" fill="#FFF"/>
              <polygon points="250,240 100,0 150,0" fill="#FFF"/>
              <polygon points="250,240 350,0 400,0" fill="#FFF"/>
              <polygon points="250,240 500,160 500,120" fill="#FFF"/>
              <polygon points="250,240 500,320 500,360" fill="#FFF"/>
              <polygon points="250,240 0,320 0,360" fill="#FFF"/>
            </g>

            <!-- Left Background: Steeple Modern Chapel (會堂) -->
            <g transform="translate(10, 160)" opacity="0.8">
              <polygon points="45,40 60,0 75,40" fill="#475569" stroke="#000" stroke-width="1.5"/>
              <!-- Cross on top of Chapel -->
              <line x1="60" y1="-12" x2="60" y2="8" stroke="#DC2626" stroke-width="3"/>
              <line x1="52" y1="-4" x2="68" y2="-4" stroke="#DC2626" stroke-width="3"/>
              <rect x="45" y="40" width="30" height="100" fill="#F1F5F9" stroke="#000" stroke-width="2"/>
              <rect x="5" y="80" width="110" height="60" fill="#E2E8F0" stroke="#000" stroke-width="2" rx="4"/>
              <polygon points="-5,80 60,45 125,80" fill="#334155" stroke="#000" stroke-width="2"/>
              <path d="M20 100 A 8 8 0 0 1 36 100 L 34 130 L 20 130 Z" fill="#FDE047" stroke="#000" stroke-width="1.2"/>
              <path d="M84 100 A 8 8 0 0 1 100 100 L 100 130 L 84 130 Z" fill="#FDE047" stroke="#000" stroke-width="1.2"/>
            </g>

            <!-- Right Background: Sleek Contemporary Cityscape (現代建築) -->
            <g transform="translate(370, 170)" opacity="0.8">
              <rect x="15" y="40" width="95" height="110" fill="#E2E8F0" stroke="#000" stroke-width="2" rx="4"/>
              <!-- Window glass grid styling -->
              <rect x="25" y="55" width="20" height="20" fill="#38BDF8" stroke="#000" stroke-width="1"/>
              <rect x="55" y="55" width="20" height="20" fill="#38BDF8" stroke="#000" stroke-width="1"/>
              <rect x="25" y="85" width="20" height="20" fill="#38BDF8" stroke="#000" stroke-width="1"/>
              <rect x="55" y="85" width="20" height="20" fill="#38BDF8" stroke="#000" stroke-width="1"/>
              <rect x="25" y="115" width="20" height="30" fill="#475569" stroke="#000" stroke-width="1"/>
              <rect x="55" y="115" width="20" height="30" fill="#475569" stroke="#000" stroke-width="1"/>
            </g>

            <!-- Metallic Round Platform Base for Hero -->
            <ellipse cx="250" cy="425" rx="140" ry="25" fill="#1E293B" stroke="#000" stroke-width="3"/>
            <ellipse cx="250" cy="420" rx="130" ry="20" fill="#475569" stroke="#94A3B8" stroke-width="2"/>
            <ellipse cx="250" cy="416" rx="110" ry="15" fill="#64748B" />

            <!-- TEEN WARRIOR CHARACTER -->
            <g id="hero-character" transform="translate(250, 240)">
              
              <!-- Red cape flying dynamically to both sides -->
              <path d="M-25 -50 L-95 65 L95 105 L25 -50 Z" fill="#DC2626" stroke="#000" stroke-width="2.5"/>
              <path d="M-25 -50 L-55 105 L-20 105 Z" fill="#991B1B" />
              <path d="M25 -50 L55 105 L20 105 Z" fill="#991B1B" />

              <!-- Jeans Legs & Shoes -->
              <rect x="-18" y="45" width="12" height="110" fill="#1E3A8A" stroke="#000" stroke-width="2"/>
              <rect x="6" y="45" width="12" height="110" fill="#1E3A8A" stroke="#000" stroke-width="2"/>

              <!-- High-top Sneakers ("福音鞋" with white soles & orange highlights resembling screenshot) -->
              <!-- Left sneaker -->
              <g transform="translate(-20, 140)">
                <path d="M-18 20 L8 20 L8 32 L-22 32 Z" fill="#FFF" stroke="#000" stroke-width="2"/>
                <path d="M-16 28 L6 28 L6 32 L-18 32 Z" fill="#EA580C" />
                <path d="M-18 0 C-18 0 8 5 8 20 L-18 20 Z" fill="#1D4ED8" stroke="#000" stroke-width="2"/>
                <path d="M-16 4 Q-6 6 -2 18" stroke="#FFF" stroke-width="2.5" fill="none"/>
                <path d="M-10 10 L4 10 M-8 14 L2 14" stroke="#FFF" stroke-width="1.5"/>
              </g>
              <!-- Right sneaker -->
              <g transform="translate(6, 140)">
                <path d="M-8 20 L18 20 L22 32 L-8 32 Z" fill="#FFF" stroke="#000" stroke-width="2"/>
                <path d="M-6 28 L16 28 L18 32 L-6 32 Z" fill="#EA580C" />
                <path d="M18 0 C18 0 -8 5 -8 20 L18 20 Z" fill="#1D4ED8" stroke="#000" stroke-width="2"/>
                <path d="M16 4 Q6 6 2 18" stroke="#FFF" stroke-width="2.5" fill="none"/>
                <path d="M10 10 L-4 10 M8 14 L-2 14" stroke="#FFF" stroke-width="1.5"/>
              </g>

              <!-- Torso Armour: Breastplate, Belt & scroll -->
              <rect x="-24" y="-30" width="48" height="85" fill="#38BDF8" stroke="#000" stroke-width="2" rx="4"/>
              <!-- Breastplate (公義的胸甲) -->
              <path d="M-22 -28 L22 -28 L18 40 L-18 40 Z" fill="#CBD5E1" stroke="#000" stroke-width="2"/>
              <path d="M-10 -15 L-10 20 M10 -15 L10 20" stroke="#94A3B8" stroke-width="2"/>
              <!-- Belt of Truth (真理腰帶) with golden buckle -->
              <rect x="-25" y="38" width="50" height="12" fill="#78350F" stroke="#000" stroke-width="2"/>
              <rect x="-7" y="35" width="14" height="18" fill="#F59E0B" stroke="#000" stroke-width="2" rx="2"/>
              <!-- Word of God scroll hanging -->
              <g transform="translate(18, 48)">
                <rect x="0" y="0" width="14" height="30" fill="#FEF08A" stroke="#000" stroke-width="1.5" rx="3" transform="rotate(15)"/>
                <text x="7" y="16" fill="#78350F" font-size="7" font-weight="900" text-anchor="middle" transform="rotate(15)">Word</text>
              </g>

              <!-- Head, Confident Face, Spiky Hair & Helmet of Salvation (救恩的頭盔) -->
              <circle cx="0" cy="-60" r="23" fill="#FDBA74" stroke="#000" stroke-width="2"/>
              <ellipse cx="-8" cy="-62" rx="3.5" ry="5.5" fill="#000"/>
              <ellipse cx="8" cy="-62" rx="3.5" ry="5.5" fill="#000"/>
              <circle cx="-9" cy="-64" r="1.5" fill="#FFF"/>
              <circle cx="7" cy="-64" r="1.5" fill="#FFF"/>
              <path d="M-7 -50 Q0 -43 7 -50" stroke="#000" stroke-width="3" fill="none"/>
              <!-- Hair spiky anime strands -->
              <path d="M-22 -60 L-27 -50 L-15 -55 L-20 -40 L-8 -51 L0 -40 L8 -51 L20 -40 L15 -55 L27 -50 L22 -60 Z" fill="#1E293B" stroke="#000" stroke-width="1.5"/>
              <path d="M-15 -77 L-24 -65 L-10 -71 L-4 -63 L4 -63 L10 -71 L24 -65 L15 -77 Z" fill="#1E293B"/>
              <!-- Helmet structure -->
              <path d="M-24 -69 C-24 -100 24 -100 24 -69 Z" fill="#94A3B8" stroke="#000" stroke-width="2"/>
              <path d="M-24 -69 L24 -69 L0 -58 Z" fill="#475569" stroke="#000" stroke-width="2"/>
              <!-- Large Red Crest Feather on top -->
              <path d="M-6 -95 Q0 -125 24 -115 Q12 -97 -2 -95" fill="#EF4444" stroke="#000" stroke-width="1.5"/>

              <!-- LEFT HAND holding Shield of Faith (信心的盾牌 with Traditional characters and Cross) -->
              <rect x="20" y="-15" width="25" height="11" fill="#94A3B8" stroke="#000" stroke-width="2" transform="rotate(20 20 -15)"/>
              <g transform="translate(54, -15)">
                <path d="M-35 -40 L35 -40 C35 -40 35 25 0 60 C-35 25 -35 -40 -35 -40 Z" fill="#D97706" stroke="#000" stroke-width="3.5"/>
                <path d="M-27 -34 L27 -34 C27 -34 27 18 0 49 C-27 18 -27 -34 -27 -34 Z" fill="#FEF08A" stroke="#000" stroke-width="2"/>
                <line x1="0" y1="-30" x2="0" y2="40" stroke="#EA580C" stroke-width="3" opacity="0.3"/>
                <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#EA580C" stroke-width="3" opacity="0.3"/>
                <!-- Cross on Shield -->
                <path d="M-4 -30 L4 -30 L4 35 L-4 35 Z" fill="#EA580C" opacity="0.3"/>
                <path d="M-20 -14 L20 -14 L20 -6 L-20 -6 Z" fill="#EA580C" opacity="0.3"/>
                <!-- Classic Traditional Chinese characters "信" and "心" with a gold outline -->
                <text x="-12" y="8" fill="#000" font-size="16" font-weight="950" text-anchor="middle" font-family="Noto Serif TC">信</text>
                <text x="12" y="8" fill="#000" font-size="16" font-weight="950" text-anchor="middle" font-family="Noto Serif TC">心</text>
              </g>

              <!-- RIGHT HAND holding Sword of the Spirit (聖靈的劍 with glowing aura) -->
              <rect x="-40" y="-15" width="25" height="11" fill="#94A3B8" stroke="#000" stroke-width="2" transform="rotate(-20 -40 -15)"/>
              <g transform="translate(-54, -20) rotate(-30)">
                <rect x="-14" y="-4" width="28" height="8" fill="#F59E0B" stroke="#000" stroke-width="2" rx="2"/>
                <rect x="-4" y="4" width="8" height="20" fill="#78350F" stroke="#000" stroke-width="2"/>
                <circle cx="0" cy="24" r="5" fill="#F59E0B" stroke="#000" stroke-width="1.5"/>
                <polygon points="-5,-4 -4,-135 0,-150 4,-135 5,-4" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="2.5" filter="url(#glow)"/>
                <line x1="0" y1="-4" x2="0" y2="-140" stroke="#38BDF8" stroke-width="2"/>
                <!-- Sparks / Electric rays of light -->
                <path d="M-15 -90 L-10 -95 L-12 -105 L-5 -98" stroke="#38BDF8" stroke-width="1.5" fill="none"/>
                <path d="M15 -70 L10 -75 L12 -85 L5 -78" stroke="#38BDF8" stroke-width="1.5" fill="none"/>
              </g>

            </g>

            <!-- =========================================================
              CLEAN LABELS & POINTERS EXACTLY MATCHING YOUR SCREENSHOT
              =========================================================
            -->
            <!-- Pointer definitions -->
            <g stroke="#000000" stroke-width="2" fill="none" marker-end="url(#pointer-dot)">
              <!-- Helmet line -->
              <path d="M 315, 135 L 255, 155"/>
              <!-- Breastplate line -->
              <path d="M 180, 210 L 225, 230"/>
              <!-- Belt line -->
              <path d="M 195, 280 L 235, 280"/>
              <!-- Sword line -->
              <path d="M 140, 310 L 175, 310"/>
              <!-- Sneakers line -->
              <path d="M 360, 370 L 320, 370"/>
            </g>

            <!-- White Label Text Cards with Premium Black Borders & Shadows -->
            <!-- 1. 頭盔 -->
            <g transform="translate(320, 120)">
              <rect x="0" y="0" width="45" height="24" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="4" filter="drop-shadow(2px 2px 0px #000)"/>
              <text x="22.5" y="16" fill="#000000" font-size="11" font-weight="900" text-anchor="middle" font-family="Noto Sans TC">頭盔</text>
            </g>
            <!-- 2. 胸甲 -->
            <g transform="translate(130, 198)">
              <rect x="0" y="0" width="45" height="24" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="4" filter="drop-shadow(2px 2px 0px #000)"/>
              <text x="22.5" y="16" fill="#000000" font-size="11" font-weight="900" text-anchor="middle" font-family="Noto Sans TC">胸甲</text>
            </g>
            <!-- 3. 腰帶 -->
            <g transform="translate(145, 268)">
              <rect x="0" y="0" width="45" height="24" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="4" filter="drop-shadow(2px 2px 0px #000)"/>
              <text x="22.5" y="16" fill="#000000" font-size="11" font-weight="900" text-anchor="middle" font-family="Noto Sans TC">腰帶</text>
            </g>
            <!-- 4. 聖靈的劍 -->
            <g transform="translate(55, 298)">
              <rect x="0" y="0" width="80" height="24" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="4" filter="drop-shadow(2px 2px 0px #000)"/>
              <text x="40" y="16" fill="#000000" font-size="11" font-weight="900" text-anchor="middle" font-family="Noto Sans TC">聖靈的劍</text>
            </g>
            <!-- 5. 福音鞋 -->
            <g transform="translate(365, 358)">
              <rect x="0" y="0" width="60" height="24" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="4" filter="drop-shadow(2px 2px 0px #000)"/>
              <text x="30" y="16" fill="#000000" font-size="11" font-weight="900" text-anchor="middle" font-family="Noto Sans TC">福音鞋</text>
            </g>
            
            <!-- Extra Badge: 符合青少年基督徒的勇士 -->
            <g transform="translate(340, 175)">
              <rect x="0" y="0" width="130" height="32" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="6" filter="drop-shadow(2px 2px 0px #000)"/>
              <text x="65" y="15" fill="#000000" font-size="10" font-weight="900" text-anchor="middle" font-family="Noto Sans TC">符合青少年</text>
              <text x="65" y="26" fill="#000000" font-size="10" font-weight="900" text-anchor="middle" font-family="Noto Sans TC">基督徒的勇士</text>
            </g>

          </svg>

        </div>

        <!-- Bottom Layout: Highly recognizable metadata card deck inside a dark border container -->
